<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>박영길 ❤️ 김하늘 피로연 안내장</title>
  <meta name="description" content="박영길 김하늘 피로연 안내장" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      background: linear-gradient(to bottom, #fff8f8, #fffdfb);
      color: #333;
      line-height: 1.7;
    }

    .wrap {
      max-width: 520px;
      margin: 0 auto;
      background: #fff;
      min-height: 100vh;
      box-shadow: 0 0 20px rgba(0,0,0,0.08);
    }

    .hero {
      position: relative;
      overflow: hidden;
      background: #f7f7f7;
    }

    .hero img {
      width: 100%;
      display: block;
      object-fit: cover;
    }

    .hero-text {
      padding: 28px 20px 24px;
      text-align: center;
      background: linear-gradient(to bottom, rgba(255,255,255,0.96), rgba(255,255,255,1));
    }

    .badge {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 999px;
      background: #8b1e2d;
      color: #fff;
      font-size: 14px;
      margin-bottom: 14px;
    }

    h1 {
      font-size: 34px;
      color: #7a1f2b;
      margin-bottom: 0;
    }

    .section {
      padding: 32px 20px;
      text-align: center;
      border-top: 1px solid #f1e6e8;
    }

    .section-title {
      font-size: 24px;
      color: #8b1e2d;
      margin-bottom: 16px;
      font-weight: bold;
    }

    .names {
      font-size: 28px;
      font-weight: bold;
      color: #4d2e2e;
      margin-bottom: 14px;
    }

    .heart {
      color: #c84d63;
      padding: 0 8px;
    }

    .info-box {
      background: #fff8f9;
      border: 1px solid #f3dce1;
      border-radius: 18px;
      padding: 20px;
      margin-top: 18px;
      text-align: left;
    }

    .info-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      font-size: 16px;
    }

    .info-row:last-child {
      margin-bottom: 0;
    }

    .label {
      min-width: 70px;
      font-weight: bold;
      color: #8b1e2d;
    }

    .value {
      color: #444;
      flex: 1;
    }

    .btn-area {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 20px;
    }

    .btn {
      display: inline-block;
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 15px 16px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      transition: 0.2s;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: #8b1e2d;
      color: white;
    }

    .btn-secondary {
      background: #f7ecef;
      color: #8b1e2d;
      border: 1px solid #eed1d8;
    }

    .music-box {
      background: #fffaf3;
      border: 1px solid #f0e3c2;
      border-radius: 18px;
      padding: 20px;
    }

    .account-card {
      background: #fff9fb;
      border: 1px solid #efd8df;
      border-radius: 18px;
      padding: 18px;
      margin-top: 16px;
      text-align: left;
    }

    .account-title {
      font-size: 18px;
      font-weight: bold;
      color: #8b1e2d;
      margin-bottom: 10px;
    }

    .account-text {
      font-size: 16px;
      color: #444;
      margin-bottom: 12px;
      word-break: break-all;
    }

    .copy-btn {
      width: 100%;
      border: none;
      background: #8b1e2d;
      color: white;
      border-radius: 12px;
      padding: 13px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    .gallery {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    .gallery img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 14px;
      display: block;
    }

    .footer {
      text-align: center;
      padding: 30px 20px 40px;
      color: #777;
      font-size: 14px;
      background: #fff8f8;
      border-top: 1px solid #f3e3e7;
    }

    @media (max-width: 420px) {
      h1 { font-size: 30px; }
      .names { font-size: 24px; }
      .gallery img { height: 150px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <img src="main.jpg" alt="신랑 신부 사진" />
      <div class="hero-text">
        <div class="badge">피로연 안내</div>
        <h1>박영길 ♥ 김하늘</h1>
      </div>
    </section>

    <section class="section">
      <div class="section-title">Invitation</div>
      <div class="names">신랑 박영길 <span class="heart">♥</span> 신부 김하늘</div>

      <div class="info-box">
        <div class="info-row">
          <div class="label">날짜</div>
          <div class="value">2026년 5월 23일</div>
        </div>
        <div class="info-row">
          <div class="label">장소</div>
          <div class="value">수월 온기당</div>
        </div>
      </div>

      <div class="btn-area">
        <a class="btn btn-primary" href="https://map.kakao.com/link/search/수월 온기당" target="_blank" rel="noopener noreferrer">
          📍 지도 열기
        </a>
        <a class="btn btn-secondary" href="tel:010-0000-0000">📞 신랑측 연락하기</a>
        <a class="btn btn-secondary" href="tel:010-1111-1111">📞 신부측 연락하기</a>
      </div>
    </section>

    <section class="section">
      <div class="section-title">Music</div>
      <div class="music-box">
        <button id="musicBtn" class="btn btn-primary">🎵 음악 재생</button>
        <audio id="bgm" loop>
          <source src="music.mp3" type="audio/mpeg" />
        </audio>
      </div>
    </section>

    <section class="section">
      <div class="section-title">마음 전하실 곳</div>

      <div class="account-card">
        <div class="account-title">신랑측 계좌</div>
        <div class="account-text">박영길 / 국민은행 / 123456-78-123456</div>
        <button class="copy-btn" onclick="copyText('박영길 / 국민은행 / 123456-78-123456')">신랑측 계좌 복사</button>
      </div>

      <div class="account-card">
        <div class="account-title">신부측 계좌</div>
        <div class="account-text">김하늘 / 신한은행 / 110-123-456789</div>
        <button class="copy-btn" onclick="copyText('김하늘 / 신한은행 / 110-123-456789')">신부측 계좌 복사</button>
      </div>
    </section>

    <section class="section">
      <div class="section-title">Gallery</div>
      <div class="gallery">
        <img src="main.jpg" alt="갤러리 사진 1" />
        <img src="sub1.jpg" alt="갤러리 사진 2" />
        <img src="sub2.jpg" alt="갤러리 사진 3" />
        <img src="sub3.jpg" alt="갤러리 사진 4" />
      </div>
    </section>

    <footer class="footer">
      박영길 ♥ 김하늘 피로연 안내장
    </footer>
  </div>

  <script>
    const musicBtn = document.getElementById("musicBtn");
    const bgm = document.getElementById("bgm");
    let isPlaying = false;

    musicBtn.addEventListener("click", async () => {
      try {
        if (!isPlaying) {
          await bgm.play();
          isPlaying = true;
          musicBtn.textContent = "⏸ 음악 정지";
        } else {
          bgm.pause();
          isPlaying = false;
          musicBtn.textContent = "🎵 음악 재생";
        }
      } catch (e) {
        alert("음악 재생에 실패했어.");
      }
    });

    function copyText(text) {
      navigator.clipboard.writeText(text)
        .then(() => alert("계좌정보가 복사됐어."))
        .catch(() => alert("복사에 실패했어."));
    }
  </script>
</body>
</html>
