<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>박영길 ❤️ 김하늘 피로연 안내장</title>
  <meta name="description" content="박영길 김하늘 피로연 안내장" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      background:
        radial-gradient(circle at top, #fff7fb 0%, #fffaf2 45%, #fffdf8 100%);
      color: #4d4d4d;
      line-height: 1.7;
    }

    .wrap {
      max-width: 520px;
      margin: 0 auto;
      background: #ffffff;
      min-height: 100vh;
      box-shadow: 0 12px 36px rgba(219, 153, 170, 0.16);
      overflow: hidden;
    }

    .hero {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, #fff4f8 0%, #fffaf3 100%);
    }

    .hero img {
      width: 100%;
      display: block;
      object-fit: cover;
    }

    .hero-text {
      padding: 30px 20px 26px;
      text-align: center;
      background:
        linear-gradient(to bottom, rgba(255,255,255,0.96), rgba(255,250,245,1));
    }

    .badge {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 999px;
      background: linear-gradient(135deg, #ff9eb5 0%, #f6b16a 100%);
      color: #fff;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 14px;
      box-shadow: 0 8px 18px rgba(245, 176, 106, 0.24);
    }

    h1 {
      font-size: 34px;
      color: #cf6f8d;
      margin-bottom: 0;
      letter-spacing: -0.5px;
    }

    .section {
      padding: 34px 20px;
      text-align: center;
      border-top: 1px solid #f8e6eb;
      background: linear-gradient(180deg, #ffffff 0%, #fffdfb 100%);
    }

    .section:nth-child(even) {
      background: linear-gradient(180deg, #fffdfc 0%, #fff8fb 100%);
    }

    .section-title {
      font-size: 26px;
      color: #dd7d98;
      margin-bottom: 18px;
      font-weight: bold;
      letter-spacing: -0.3px;
    }

    .names {
      font-size: 28px;
      font-weight: bold;
      color: #8d6674;
      margin-bottom: 14px;
    }

    .heart {
      color: #ff90ab;
      padding: 0 8px;
    }

    .info-box {
      background: linear-gradient(180deg, #fff7fa 0%, #fffdf9 100%);
      border: 1px solid #f7d9e2;
      border-radius: 22px;
      padding: 22px;
      margin-top: 18px;
      text-align: left;
      box-shadow: 0 8px 22px rgba(237, 183, 194, 0.14);
    }

    .info-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      font-size: 16px;
    }

    .info-row:last-child {
      margin-bottom: 0;
    }

    .label {
      min-width: 70px;
      font-weight: bold;
      color: #e0829c;
    }

    .value {
      color: #5b5b5b;
      flex: 1;
    }

    .btn-area {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 22px;
    }

    .btn {
      display: inline-block;
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 15px 16px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      transition: 0.2s;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: linear-gradient(135deg, #ff9cb2 0%, #f4b36c 100%);
      color: white;
      box-shadow: 0 10px 22px rgba(246, 177, 106, 0.25);
    }

    .btn-secondary {
      background: linear-gradient(180deg, #fff6f8 0%, #fffdfc 100%);
      color: #d57693;
      border: 1px solid #f3d7df;
      box-shadow: 0 6px 14px rgba(233, 192, 202, 0.14);
    }

    .music-box {
      background: linear-gradient(180deg, #fffaf3 0%, #fff6fb 100%);
      border: 1px solid #f5dfc7;
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(245, 208, 175, 0.14);
    }

    .account-card,
    .guestbook-form,
    .guestbook-item {
      background: linear-gradient(180deg, #fff8fb 0%, #fffefb 100%);
      border: 1px solid #f5dbe3;
      border-radius: 22px;
      padding: 18px;
      margin-top: 16px;
      text-align: left;
      box-shadow: 0 8px 18px rgba(232, 188, 198, 0.12);
    }

    .account-title,
    .guestbook-item-name {
      font-size: 18px;
      font-weight: bold;
      color: #dd7d98;
      margin-bottom: 10px;
    }

    .account-text {
      font-size: 16px;
      color: #5b5b5b;
      margin-bottom: 12px;
      word-break: break-all;
    }

    .copy-btn {
      width: 100%;
      border: none;
      background: linear-gradient(135deg, #ff9cb2 0%, #f4b36c 100%);
      color: white;
      border-radius: 14px;
      padding: 13px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(246, 177, 106, 0.2);
    }

    .gallery {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    .gallery img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 16px;
      display: block;
      box-shadow: 0 8px 18px rgba(226, 190, 197, 0.16);
    }

    .footer {
      text-align: center;
      padding: 30px 20px 40px;
      color: #b18895;
      font-size: 14px;
      background: linear-gradient(180deg, #fff7fa 0%, #fffaf3 100%);
      border-top: 1px solid #f5e0e6;
    }

    .input,
    .textarea {
      width: 100%;
      border: 1px solid #efd5dd;
      background: #ffffff;
      border-radius: 14px;
      padding: 14px;
      font-size: 15px;
      outline: none;
      margin-bottom: 12px;
      color: #555;
    }

    .input:focus,
    .textarea:focus {
      border-color: #f3a3b7;
      box-shadow: 0 0 0 4px rgba(255, 176, 196, 0.16);
    }

    .textarea {
      min-height: 120px;
      resize: vertical;
      font-family: inherit;
    }

    .guestbook-actions {
      display: flex;
      gap: 10px;
    }

    .guestbook-list {
      margin-top: 18px;
    }

    .guestbook-item {
      margin-top: 12px;
    }

    .guestbook-item-date {
      font-size: 12px;
      color: #b9a3ac;
      margin-bottom: 8px;
    }

    .guestbook-item-message {
      font-size: 15px;
      color: #555;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .status-text {
      margin-top: 12px;
      font-size: 14px;
      color: #d47b95;
      text-align: center;
    }

    .empty-text {
      padding: 18px;
      border-radius: 18px;
      background: linear-gradient(180deg, #fff7fa 0%, #fffdf8 100%);
      color: #a88a95;
      font-size: 15px;
      border: 1px solid #f4dee5;
    }

    @media (max-width: 420px) {
      h1 { font-size: 30px; }
      .names { font-size: 24px; }
      .gallery img { height: 150px; }
      .section-title { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <img src="main.jpg" alt="신랑 신부 사진" />
      <div class="hero-text">
        <div class="badge">피로연 안내</div>
        <h1>박영길 ♥ 김하늘</h1>
      </div>
    </section>

    <section class="section">
      <div class="section-title">Invitation</div>
      <div class="names">신랑 박영길 <span class="heart">♥</span> 신부 김하늘</div>

      <div class="info-box">
        <div class="info-row">
          <div class="label">날짜</div>
          <div class="value">2026년 5월 23일</div>
        </div>
        <div class="info-row">
          <div class="label">장소</div>
          <div class="value">수월 온기당</div>
        </div>
      </div>

      <div class="btn-area">
        <a class="btn btn-primary" href="https://map.kakao.com/link/search/수월 온기당" target="_blank" rel="noopener noreferrer">
          📍 지도 열기
        </a>
        <a class="btn btn-secondary" href="tel:010-0000-0000">📞 신랑측 연락하기</a>
        <a class="btn btn-secondary" href="tel:010-1111-1111">📞 신부측 연락하기</a>
      </div>
    </section>

    <section class="section">
      <div class="section-title">Music</div>
      <div class="music-box">
        <button id="musicBtn" class="btn btn-primary">🎵 음악 재생</button>
        <audio id="bgm" loop>
          <source src="music.mp3" type="audio/mpeg" />
        </audio>
      </div>
    </section>

    <section class="section">
      <div class="section-title">마음 전하실 곳</div>

      <div class="account-card">
        <div class="account-title">신랑측 계좌</div>
        <div class="account-text">박영길 / 국민은행 / 123456-78-123456</div>
        <button class="copy-btn" onclick="copyText('박영길 / 국민은행 / 123456-78-123456')">신랑측 계좌 복사</button>
      </div>

      <div class="account-card">
        <div class="account-title">신부측 계좌</div>
        <div class="account-text">김하늘 / 신한은행 / 110-123-456789</div>
        <button class="copy-btn" onclick="copyText('김하늘 / 신한은행 / 110-123-456789')">신부측 계좌 복사</button>
      </div>
    </section>

    <section class="section">
      <div class="section-title">방명록</div>

      <div class="guestbook-form">
        <input id="guestName" class="input" type="text" maxlength="20" placeholder="이름" />
        <textarea id="guestMessage" class="textarea" maxlength="300" placeholder="축하 메시지를 남겨주세요"></textarea>
        <div class="guestbook-actions">
          <button id="saveGuestbookBtn" class="btn btn-primary" type="button">메시지 남기기</button>
        </div>
        <div id="guestbookStatus" class="status-text"></div>
      </div>

      <div id="guestbookList" class="guestbook-list">
        <div class="empty-text">아직 등록된 메시지가 없어요.</div>
      </div>
    </section>

    <section class="section">
      <div class="section-title">Gallery</div>
      <div class="gallery">
        <img src="main.jpg" alt="갤러리 사진 1" />
        <img src="sub1.jpg" alt="갤러리 사진 2" />
        <img src="sub2.jpg" alt="갤러리 사진 3" />
        <img src="sub3.jpg" alt="갤러리 사진 4" />
      </div>
    </section>

    <footer class="footer">
      박영길 ♥ 김하늘 피로연 안내장
    </footer>
  </div>

  <script>
    const musicBtn = document.getElementById("musicBtn");
    const bgm = document.getElementById("bgm");
    let isPlaying = false;

    musicBtn.addEventListener("click", async () => {
      try {
        if (!isPlaying) {
          await bgm.play();
          isPlaying = true;
          musicBtn.textContent = "⏸ 음악 정지";
        } else {
          bgm.pause();
          isPlaying = false;
          musicBtn.textContent = "🎵 음악 재생";
        }
      } catch (e) {
        alert("음악 재생에 실패했어.");
      }
    });

    function copyText(text) {
      navigator.clipboard.writeText(text)
        .then(() => alert("계좌정보가 복사됐어."))
        .catch(() => alert("복사에 실패했어."));
    }
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      query,
      orderBy,
      limit
    } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAnRejVV1FNWTRNEOwEezx4xI04ZhTD6LM",
      authDomain: "wedding-2c2ed.firebaseapp.com",
      projectId: "wedding-2c2ed",
      storageBucket: "wedding-2c2ed.firebasestorage.app",
      messagingSenderId: "44011060327",
      appId: "1:44011060327:web:d37cc08f5482056ee14ab2",
      measurementId: "G-YK4PEEH3J5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const guestName = document.getElementById("guestName");
    const guestMessage = document.getElementById("guestMessage");
    const saveGuestbookBtn = document.getElementById("saveGuestbookBtn");
    const guestbookList = document.getElementById("guestbookList");
    const guestbookStatus = document.getElementById("guestbookStatus");

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function formatDate(ts) {
      const d = new Date(ts);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      return `${y}.${m}.${day} ${hh}:${mm}`;
    }

    function renderGuestbook(items) {
      if (!items.length) {
        guestbookList.innerHTML = `<div class="empty-text">아직 등록된 메시지가 없어요.</div>`;
        return;
      }

      guestbookList.innerHTML = items.map(item => `
        <div class="guestbook-item">
          <div class="guestbook-item-name">${escapeHtml(item.name)}</div>
          <div class="guestbook-item-date">${formatDate(item.createdAt)}</div>
          <div class="guestbook-item-message">${escapeHtml(item.message)}</div>
        </div>
      `).join("");
    }

    async function loadGuestbook() {
      try {
        guestbookStatus.textContent = "불러오는 중...";
        const q = query(
          collection(db, "guestbook"),
          orderBy("createdAt", "desc"),
          limit(30)
        );
        const snapshot = await getDocs(q);
        const items = snapshot.docs.map(doc => doc.data());
        renderGuestbook(items);
        guestbookStatus.textContent = "";
      } catch (error) {
        console.error(error);
        guestbookStatus.textContent = "방명록을 불러오지 못했어.";
      }
    }

    async function saveGuestbook() {
      const name = guestName.value.trim();
      const message = guestMessage.value.trim();

      if (!name) {
        alert("이름을 입력해줘.");
        guestName.focus();
        return;
      }

      if (!message) {
        alert("메시지를 입력해줘.");
        guestMessage.focus();
        return;
      }

      try {
        saveGuestbookBtn.disabled = true;
        guestbookStatus.textContent = "등록하는 중...";

        await addDoc(collection(db, "guestbook"), {
          name,
          message,
          createdAt: Date.now()
        });

        guestName.value = "";
        guestMessage.value = "";
        guestbookStatus.textContent = "등록됐어.";
        await loadGuestbook();
      } catch (error) {
        console.error(error);
        guestbookStatus.textContent = "등록에 실패했어.";
      } finally {
        saveGuestbookBtn.disabled = false;
      }
    }

    saveGuestbookBtn.addEventListener("click", saveGuestbook);
    loadGuestbook();
  </script>
</body>
</html>
